name: Spring Boot Docker CI/CD

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate Commit SHA Tag
        id: vars
        run: echo "SHA_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Run Maven Unit Tests
        run: mvn clean test

      - name: Build Docker Image
        run: |
          docker build \
            -t $REGISTRY/${{ github.repository }}:$SHA_TAG \
            -t $REGISTRY/${{ github.repository }}:latest .

      - name: Run Tests Inside Container
        run: |
          docker run --rm \
            $REGISTRY/${{ github.repository }}:$SHA_TAG \
            java -version

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Images
        run: |
          docker push $REGISTRY/${{ github.repository }}:$SHA_TAG
          docker push $REGISTRY/${{ github.repository }}:latest

      - name: Deployment Summary
        run: |
          echo "Image pushed:"
          echo "$REGISTRY/${{ github.repository }}:$SHA_TAG"