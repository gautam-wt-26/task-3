name: CI-CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

env:
  REGISTRY: ghcr.io
  SHA_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Maven Unit Tests
        run: mvn clean test

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.SHA_TAG }} \
            -t ${{ env.REGISTRY }}/${{ github.repository }}:latest .

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Images
        run: |
          docker push ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.SHA_TAG }}
          docker push ${{ env.REGISTRY }}/${{ github.repository }}:latest
